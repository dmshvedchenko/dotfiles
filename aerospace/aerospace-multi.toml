config-version = 2

after-startup-command = []

start-at-login = false

enable-normalization-flatten-containers = true
enable-normalization-opposite-orientation-for-nested-containers = true

accordion-padding = 30

default-root-container-layout = 'tiles'
default-root-container-orientation = 'auto'

# Лучше выключить, чтобы не усиливать прыжки фокуса/мыши
on-focused-monitor-changed = []
on-focus-changed = ['move-mouse window-lazy-center']

automatically-unhide-macos-hidden-apps = false

persistent-workspaces = [
  # "1", "2", "3", "4", "5", "6", "7", "8", "9",
  "A", "B", "C", "D", "E", "F", "G", "I", "M", "N", "O", "P", "Q",
  "R", "S", "T", "U", "V", "W", "X", "Y", "Z",

  # Profile workspaces
  "P1", "P2", "P3",
  "C1", "C2", "C3"
]

on-mode-changed = []

[key-mapping]
    preset = 'qwerty'

[gaps]
    inner.horizontal = 10
    inner.vertical =   10
    outer.left =       10
    outer.bottom =     10
    outer.top =        10
    outer.right =      10


# =========================
# Workspace to monitor mapping
# =========================
# Monitors:
# 1    = left Dell
# main = middle/main Dell
# 3    = right Dell

[workspace-to-monitor-force-assignment]
P1 = 1
P2 = 'main'
P3 = 3

C1 = 1
C2 = 'main'
C3 = 3

M = 'main'
O = 'main'
A = 'main'


# =========================
# Main mode bindings
# =========================

[mode.main.binding]

    # Layout
    alt-slash = 'layout tiles horizontal vertical'
    alt-comma = 'layout accordion horizontal vertical'

    # Focus
    alt-h = 'focus left'
    alt-j = 'focus down'
    alt-k = 'focus up'
    alt-l = 'focus right'

    # Move windows
    alt-shift-h = 'move left'
    alt-shift-j = 'move down'
    alt-shift-k = 'move up'
    alt-shift-l = 'move right'

    # Resize
    # alt-minus = 'resize smart -50'
    # alt-equal = 'resize smart +50'
    # Resize windows
    alt-ctrl-h = 'resize width -50'
    alt-ctrl-l = 'resize width +50'
    alt-ctrl-j = 'resize height +50'
    alt-ctrl-k = 'resize height -50'

    # Standard workspaces
    # alt-1 = 'workspace 1'
    # alt-2 = 'workspace 2'
    # alt-3 = 'workspace 3'
    # alt-4 = 'workspace 4'
    # alt-5 = 'workspace 5'
    # alt-6 = 'workspace 6'
    # alt-7 = 'workspace 7'
    # alt-8 = 'workspace 8'
    # alt-9 = 'workspace 9'

    alt-a = 'workspace A'
    alt-b = 'workspace B'
    # alt-c is used below as a profile hotkey
    alt-d = 'workspace D'
    alt-e = 'workspace E'
    alt-f = 'workspace F'
    alt-g = 'workspace G'
    alt-i = 'workspace I'
    alt-m = 'workspace M'
    #alt-n = 'workspace N2'
    alt-o = 'workspace O'
    #alt-p = 'workspace P'
    alt-q = 'workspace Q'
    alt-r = 'workspace R'
    alt-s = 'workspace S'
    alt-t = 'workspace T'
    alt-u = 'workspace U'
    alt-v = 'workspace V'
    #alt-w = 'workspace W'
    alt-x = 'workspace X'
    alt-y = 'workspace Y'
    alt-z = 'workspace Z'

    # Move focused window to standard workspaces
    # alt-shift-1 = 'move-node-to-workspace 1'
    # alt-shift-2 = 'move-node-to-workspace 2'
    # alt-shift-3 = 'move-node-to-workspace 3'
    # alt-shift-4 = 'move-node-to-workspace 4'
    # alt-shift-5 = 'move-node-to-workspace 5'
    # alt-shift-6 = 'move-node-to-workspace 6'
    # alt-shift-7 = 'move-node-to-workspace 7'
    # alt-shift-8 = 'move-node-to-workspace 8'
    # alt-shift-9 = 'move-node-to-workspace 9'

    alt-shift-a = 'move-node-to-workspace A'
    alt-shift-b = 'move-node-to-workspace B'
    alt-shift-c = 'move-node-to-workspace C2'
    alt-shift-d = 'move-node-to-workspace D'
    alt-shift-e = 'move-node-to-workspace E'
    alt-shift-f = 'move-node-to-workspace F'
    alt-shift-g = 'move-node-to-workspace G'
    alt-shift-i = 'move-node-to-workspace I'
    alt-shift-m = 'move-node-to-workspace M'
    alt-shift-n = 'move-node-to-workspace P2'
    alt-shift-o = 'move-node-to-workspace O'
    alt-shift-p = 'move-node-to-workspace P'
    alt-shift-q = 'move-node-to-workspace Q'
    alt-shift-r = 'move-node-to-workspace R'
    alt-shift-s = 'move-node-to-workspace S'
    alt-shift-t = 'move-node-to-workspace T'
    alt-shift-u = 'move-node-to-workspace U'
    alt-shift-v = 'move-node-to-workspace V'
    alt-shift-w = 'move-node-to-workspace W'
    alt-shift-x = 'move-node-to-workspace X'
    alt-shift-y = 'move-node-to-workspace Y'
    alt-shift-z = 'move-node-to-workspace Z'

    # Move focused window to profile workspaces
    alt-shift-leftSquareBracket = 'move-node-to-workspace P1'
    alt-shift-rightSquareBracket = 'move-node-to-workspace P2'
    alt-shift-backslash = 'move-node-to-workspace P3'

    ctrl-shift-leftSquareBracket = 'move-node-to-workspace C1'
    ctrl-shift-rightSquareBracket = 'move-node-to-workspace C2'
    ctrl-shift-backslash = 'move-node-to-workspace C3'

    # Workspace back and forth
    alt-tab = 'workspace-back-and-forth'

    # Move current workspace to next monitor
    alt-shift-tab = 'move-workspace-to-monitor --wrap-around next'

    # Service mode
    alt-shift-semicolon = 'mode service'


    # =========================
    # Profile hotkeys
    # =========================

    # alt+n profile:
    # left  -> P1 -> Teams
    # main  -> P2 -> Safari
    # right -> P3 -> Sublime Text
    alt-p = [
      'workspace P1',
      'workspace P2',
      'workspace P3',
      'workspace P2'
    ]

    # alt+c profile:
    # left  -> C1 -> empty / optional
    # main  -> C2 -> Firefox
    # right -> C3 -> Slack
    alt-c = [
      'workspace C1',
      'workspace C2',
      'workspace C3',
      'workspace C2'
    ]


# =========================
# Service mode bindings
# =========================

[mode.service.binding]
    esc = ['reload-config', 'mode main']
    r = ['flatten-workspace-tree', 'mode main']
    f = ['layout floating tiling', 'mode main']
    backspace = ['close-all-windows-but-current', 'mode main']

    alt-shift-h = ['join-with left', 'mode main']
    alt-shift-j = ['join-with down', 'mode main']
    alt-shift-k = ['join-with up', 'mode main']
    alt-shift-l = ['join-with right', 'mode main']

# =========================
# App to workspace rules
# =========================

# alt+n profile:
# left  -> N1 -> Microsoft Teams
# main  -> N2 -> Safari
# right -> N3 -> Sublime Text

