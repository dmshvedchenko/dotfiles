##### Plugins #####
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'christoomey/vim-tmux-navigator'

##### Shell #####
set-option -g default-shell "/bin/zsh"

##### Prefix #####
unbind C-b
set-option -g prefix C-f
bind-key C-f send-prefix

##### Mouse #####
set-option -g mouse on
bind m set -g mouse on \; display-message "Mouse: ON"
bind M set -g mouse off \; display-message "Mouse: OFF"

##### Copy mode #####
setw -g mode-keys vi
bind v copy-mode

# Start normal character selection
bind-key -T copy-mode-vi v send -X begin-selection

# Start line selection like Vim Shift+v
bind-key -T copy-mode-vi V send -X select-line

# Optional: make Space select whole line instead of character selection
bind-key -T copy-mode-vi Space send -X select-line

# Copy selected text to macOS clipboard, trimming trailing spaces/tabs on each line
bind-key -T copy-mode-vi y send -X copy-pipe-and-cancel "sed -E 's/[[:blank:]]+$//' | pbcopy"

# Mouse selection -> macOS clipboard, trimming trailing spaces/tabs on each line
bind-key -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel "sed -E 's/[[:blank:]]+$//' | pbcopy"

# Copy whole current line to macOS clipboard, trimming trailing spaces/tabs
bind-key -T copy-mode-vi Y send -X select-line \; send -X copy-pipe-and-cancel "sed -E 's/[[:blank:]]+$//' | pbcopy"

##### Windows / panes #####
unbind c
bind c new-window -c ~

unbind '"'
unbind %
bind '"' split-window -v -c ~
bind % split-window -h -c ~
bind | split-window -h -c ~
bind - split-window -v -c ~

##### Reload config #####
bind r source-file ~/.tmux.conf \; display-message "tmux config reloaded"

##### Window names #####
set-option -g allow-rename off

##### Resize / zoom pane #####
bind-key > resize-pane -Z \; display-message "Zoom zoom zoom"
bind -r H resize-pane -L 5
bind -r L resize-pane -R 5
bind -r K resize-pane -U 5
bind -r J resize-pane -D 5

##### Display popups #####

# Prefix + g: LazyGit
bind-key g display-popup \
  -d "#{pane_current_path}" \
  -w 80% \
  -h 80% \
  -E "lazygit"

# Prefix + N: create a new named session
bind-key N display-popup \
  -w 60% \
  -h 30% \
  -E 'zsh -ic '\''read "name?Session name: "; [[ -n "$name" ]] && tmux new-session -d -s "$name" && tmux switch-client -t "$name"'\'''

# Prefix + s: select another session
bind-key s display-popup \
  -w 60% \
  -h 70% \
  -E 'tmux list-sessions -F "#{session_name}" |
      grep -vxF "$(tmux display-message -p "#S")" |
      fzf --reverse |
      xargs -I{} tmux switch-client -t "{}"'

# Prefix + R: ranger
bind-key R display-popup \
  -d "#{pane_current_path}" \
  -w 90% \
  -h 90% \
  -E "yazi"

# Prefix + Z: edit zshrc
bind-key Z display-popup \
  -d "#{pane_current_path}" \
  -w 90% \
  -h 90% \
  -E "nvim ~/.zshrc"

# Prefix + a: ChatGPT popup
bind-key a display-popup \
  -d "#{pane_current_path}" \
  -w 90% \
  -h 90% \
  -E "zsh -ic ~/.tmux/scripts/chat-popup.sh"

# Prefix + t: interactive zsh
bind-key t display-popup \
  -d "#{pane_current_path}" \
  -w 75% \
  -h 75% \
  -E "zsh -l"

##### Terminal / colors #####
set -g default-terminal "tmux-256color"
set-environment -gu TERM
set -g focus-events on
set-option -ga terminal-overrides ",xterm-256color:Tc"
set-option -ga terminal-overrides ",tmux-256color:Tc"

##### Dracula theme #####
set -g @dracula-show-fahrenheit false
set -g @dracula-plugins "cpu-usage ram-usage time"
set -g @dracula-show-powerline true
set -g @dracula-show-left-icon empty
set -g @dracula-show-timezone false
set -g @dracula-border-contrast true
set -g @dracula-show-left-sep 
set -g @dracula-background-color "#002b36"
set -g @dracula-show-right-sep 
set -g @dracula-show-flags true

run-shell ~/.tmux/plugins/tmux-dracula/dracula.tmux

##### Optional: pane scrollbars #####
set -g pane-scrollbars on

##### TPM init. Keep this at the very bottom. #####
run '~/.tmux/plugins/tpm/tpm'
